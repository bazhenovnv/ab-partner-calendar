name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ab_partner_calendar?schema=public
      JWT_SECRET: ci_secret
      BACKEND_PORT: 4000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      ADMIN_EMAIL: admin@ab-partner.ru
      ADMIN_PASSWORD: Admin12345!
      TELEGRAM_SYNC_ENABLED: false
      TELEGRAM_CHANNEL_URL: https://t.me/ab_afisha_buh
      TELEGRAM_CHANNEL_USERNAME: ab_afisha_buh
      SOURCE_CONNECTORS_JSON: '[]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run generate

      - name: Lint / typecheck
        run: npm run lint

      - name: Build
        run: npm run build
